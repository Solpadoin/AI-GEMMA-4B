<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fable5 Launcher</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c0f10;
        --panel: #151b1e;
        --text: #eef4f2;
        --muted: #8fa09b;
        --accent: #66d9c4;
        --border: #2c383c;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Segoe UI, system-ui, sans-serif;
      }
      main {
        width: min(720px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }
      h1 {
        margin: 0 0 10px;
      }
      p {
        color: var(--muted);
        line-height: 1.5;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }
      a {
        display: inline-block;
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 10px 13px;
        color: var(--text);
        text-decoration: none;
        background: #1d2528;
      }
      a.primary {
        color: #06120f;
        border-color: var(--accent);
        background: var(--accent);
        font-weight: 700;
      }
      code {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Fable5 Local Agent</h1>
      <p>
        Современный браузер не имеет права сам запускать локальные процессы с HTML-страницы. Поэтому старт сервиса
        делается через <code>Start-Fable5.bat</code>, а эта страница служит быстрым пультом.
      </p>
      <div class="actions">
        <a class="primary" href="Start-Fable5.bat">Запустить сервис</a>
        <a href="Restart-Fable5.bat">Перезапустить</a>
        <a href="Stop-Fable5.bat">Остановить</a>
        <a href="http://127.0.0.1:7860/">Открыть UI</a>
      </div>
    </main>
  </body>
</html>
